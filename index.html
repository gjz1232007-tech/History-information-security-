<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>История развития информационной безопасности</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.55;
            background-color: #ffffff;
            color: #000000;
        }

        header {
            background-color: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #000000;
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0.4rem 0.2rem;
            color: #000000;
            transition: all 0.2s ease;
            font-family: inherit;
            border-bottom: 2px solid transparent;
        }

        .nav-btn:hover {
            color: #0066cc;
            border-bottom-color: #0066cc;
        }

        .nav-btn.active {
            color: #0066cc;
            border-bottom-color: #0066cc;
            font-weight: 600;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            min-height: 70vh;
        }

        section.page {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 1rem;
            border-left: 5px solid #0066cc;
            padding-left: 1rem;
            font-weight: 600;
        }

        h2 {
            font-size: 1.8rem;
            margin: 1.8rem 0 1rem 0;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 0.4rem;
            font-weight: 500;
        }

        h3 {
            font-size: 1.3rem;
            margin: 1.2rem 0 0.7rem 0;
            color: #1a1a1a;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .card {
            background: #f8f9fa;
            border-left: 4px solid #0066cc;
            padding: 1.4rem;
            border-radius: 0 12px 12px 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }

        .timeline-item {
            background: #f8f9fa;
            border-left: 4px solid #0066cc;
            padding: 1.2rem 1.5rem;
            margin: 1.2rem 0;
            border-radius: 0 12px 12px 0;
            transition: 0.1s;
        }

        .year {
            font-weight: 700;
            font-size: 1.2rem;
            color: #0066cc;
            display: inline-block;
            margin-bottom: 0.4rem;
        }

        .threat-card {
            border-left-color: #cc0000;
        }

        .protect-card {
            border-left-color: #006600;
        }

        footer {
            background-color: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #2c2c2c;
        }

        @media (max-width: 760px) {
            nav {
                flex-direction: column;
                gap: 0.8rem;
            }
            .nav-links {
                justify-content: center;
                gap: 1.2rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            main {
                padding: 0 1.2rem;
            }
        }
    </style>
</head>

                <div class="timeline-item"><span class="year">~500 до н.э. — Скитала (Спарта)</span><br>Первый шифр перестановки. Информация наносилась на ремень, намотанный на цилиндр заданного диаметра. Использовался военными. Развитие: принцип «секретности ключа» сохранился до наших дней.</div>
                <div class="timeline-item"><span class="year">~50 до н.э. — Шифр Цезаря</span><br>Моноалфавитный сдвиг. Прост в реализации, но уязвим к частотному анализу. Применялся в армейской переписке Римской империи. Прямое развитие — шифр Рот13.</div>
                <div class="timeline-item"><span class="year">IX век — Аль‑Кинди и частотный анализ</span><br>Арабский философ описал метод взлома любой моноалфавитной замены по частоте появления букв. Это превратило криптографию из ремесла в науку. Сегодня частотный анализ — основа обучения криптоанализу.</div>
                <div class="timeline-item"><span class="year">1467 — Альберти и полиалфавитный шифр</span><br>Леон Баттиста Альберти изобрёл шифровальный диск, позволяющий использовать несколько алфавитов. Затруднило частотный анализ. Развитие → шифр Виженера (1586).</div>
                <div class="timeline-item"><span class="year">1883 — Принцип Керкгоффса</span><br>«Система должна быть секретна, даже если всё, кроме ключа, известно врагу». Стал краеугольным камнем современной криптографии (открытые алгоритмы, секретный только ключ).</div>
                <div class="timeline-item"><span class="year">1917 — Вернам и одноразовый блокнот</span><br>Шеннон в 1949 году доказал абсолютную стойкость при условии случайного ключа, длина ≥ сообщения и одноразовости. Использовался на линии связи Москва–Вашингтон.</div>
                <div class="timeline-item"><span class="year">1943 — Colossus (Томми Флауэрс)</span><br>Первый программируемый электронный компьютер для взлома шифра Lorenz (Tunny) нацистской Германии. Сократил время дешифровки с недель до часов.</div>
                <div class="timeline-item"><span class="year">1949 — Шеннон: теория секретных систем</span><br>Математические основы криптографии, введено понятие «расстояние единственности». Объединил информацию и энтропию.</div>
                <div class="timeline-item"><span class="year">1971 — Creeper и Reaper</span><br>Первые вирус и антивирус (экспериментальные). Положили начало индустрии антивирусного ПО.</div>
                <div class="timeline-item"><span class="year">1976 — Диффи–Хеллман</span><br>Концепция асимметричной криптографии и открытое распределение ключей. Премия Тьюринга 2015. Без этой работы не было бы безопасного интернета.</div>
                <div class="timeline-item"><span class="year">1977 — RSA (Ривест, Шамир, Адлеман)</span><br>Первый практический алгоритм асимметричного шифрования. Используется в PGP, TLS, цифровых подписях до сих пор.</div>
                <div class="timeline-item"><span class="year">1986 — Brain (первый вирус для IBM PC)</span><br>Братья Алви из Пакистана. Загружался в boot-сектор дискет. Привёл к созданию коммерческих антивирусов (McAfee 1987).</div>
                <div class="timeline-item"><span class="year">1988 — Червь Морриса</span><br>Вывел из строя 6000 серверов (10% тогдашнего интернета). Послужил созданию CERT и FIRST. Моррис позже профессор MIT.</div>
                <div class="timeline-item"><span class="year">1991 — PGP (Филипп Циммерман)</span><br>Шифрование email и файлов с открытым ключом. Вызвал уголовное расследование за экспорт криптографии. Обеспечил приватность миллионам.</div>
                <div class="timeline-item"><span class="year">1994 — SSL (Netscape) → TLS</span><br>Протокол безопасного соединения для веба. Эволюция: TLS 1.2 (2008), TLS 1.3 (2018) — каркас современного HTTPS.</div>
                <div class="timeline-item"><span class="year">2000 — ILOVEYOU</span><br>Визер-вирус на VBS, жертва — 50 млн ПК, ущерб рекордные $15 млрд. Стимулировал принятие законов о киберпреступлениях.</div>
                <div class="timeline-item"><span class="year">2010 — Stuxnet</span><br>Первый киберчервь, разрушающий физическую инфраструктуру (иранские центрифуги). Совместная разработка США и Израиля. Переворот в понимании кибероружия.</div>
                <div class="timeline-item"><span class="year">2013 — Сноуден и раскрытие PRISM</span><br>Разоблачение глобальной слежки АНБ, после чего резко выросло использование шифрования (Signal, WhatsApp, ProtonMail).</div>
                <div class="timeline-item"><span class="year">2017 — WannaCry / NotPetya</span><br>WannaCry парализовал NHS, ущерб $4 млрд. NotPetya — деструктивная атака Sandworm, ущерб $10 млрд. Переход от простых вымогателей к вайперу.</div>
                <div class="timeline-item"><span class="year">2021 — Log4Shell</span><br>Уязвимость CVSS 10.0 в Apache Log4j. Удалённое выполнение кода. Затронула миллионы приложений (Steam, Tesla, Apple). Показала риски open-source цепочек поставок.</div>
                <div class="timeline-item"><span class="year">2025 — Постквантовая криптография (NIST)</span><br>Стандартизированы ML-KEM (замена RSA/ECC), ML-DSA, SLH-DSA на основе решёток. Начало миграции TLS, государственных систем к устойчивым к квантовому взлому алгоритмам.</div>
                <div class="timeline-item"><span class="year">2026 — Повсеместный Zero Trust</span><br>Обязателен для госорганов и объектов КИИ в РФ и США. Микросегментация, непрерывная верификация, принцип наименьшего доступа.</div>
                <p style="margin-top: 2rem;">Каждое событие в хронологии внесло вклад в современные практики: антивирусы, PKI, шифрование дисков, SIEM, bug bounty, threat hunting. История ИБ — это постоянное обучение на ошибках прошлого.</p>
            </section>
        `
    };
    
    // --- логика переключения вкладок без перезагрузки ---
    let currentPage = "home";
    
    function renderPage(pageId) {
        const container = document.getElementById('app-root');
        if (pages[pageId]) {
            container.innerHTML = pages[pageId];
            currentPage = pageId;
            // обновить активный класс кнопок
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const btnPage = btn.getAttribute('data-page');
                if (btnPage === pageId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            // прокрутка вверх
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            container.innerHTML = '<p>Ошибка: страница не найдена</p>';
        }
    }
    
    // обработчики кликов
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const page = btn.getAttribute('data-page');
            if (page) renderPage(page);
        });
    });
    
    // начальная загрузка
    renderPage('home');
</script>
